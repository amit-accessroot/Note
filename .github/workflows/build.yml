name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # 1. प्रोजेक्ट फाइल्स को री-क्रिएट करना
    - name: Repair and Recreate Android Project Files
      run: flutter create --org com.andrpid --project-name=note .

    # 2. 🚨 सही थीम (Theme.Material3) के साथ प्योर व्हाइट मोड को फोर्स करना
    - name: Force Pure White Theme with Correct Material3 Theme
      run: |
        cat <<EOT > android/app/src/main/res/values/styles.xml
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="LaunchTheme" parent="Theme.Material3.DayNight.NoActionBar">
                <item name="android:windowBackground">@drawable/launch_background</item>
                <item name="android:navigationBarColor">#FFFFFF</item>
                <item name="android:windowLightNavigationBar">true</item>
                <item name="android:statusBarColor">#FFFFFF</item>
                <item name="android:windowLightStatusBar">true</item>
            </style>
            <style name="NormalTheme" parent="Theme.Material3.DayNight.NoActionBar">
                <item name="android:windowBackground">?android:colorBackground</item>
                <item name="android:navigationBarColor">#FFFFFF</item>
                <item name="android:windowLightNavigationBar">true</item>
                <item name="android:statusBarColor">#FFFFFF</item>
                <item name="android:windowLightStatusBar">true</item>
            </style>
        </resources>
        EOT

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Note-App-Release-APK
        path: build/app/outputs/flutter-apk/app-release.apk

