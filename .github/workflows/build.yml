name: Flutter Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.x'
        channel: 'stable'

    # यहाँ हमने प्रोजेक्ट का नाम छोटे अक्षरों में (note) फिक्स कर दिया है
    - name: Repair and Recreate Android Project Files
      run: flutter create --org com.andrpid --project-name=note .

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Note-App-Release-APK
        path: build/app/outputs/flutter-apk/app-release.apk
